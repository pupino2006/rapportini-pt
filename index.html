<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>App Rapportini</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.0.0/dist/signature_pad.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="home-screen">
    <div style="text-align: center; padding: 40px 20px;">
        <h2 style="color: #004a99;">Gestione Interventi</h2>
        <button onclick="mostraApp()" class="btn-main-menu">➕ NUOVO RAPPORTO</button>
        <button onclick="caricaStorico()" class="btn-main-menu" style="background: #6c757d;">📂 STORICO RAPPORTI</button>
    </div>
</div>

<div id="tab-storico" style="display:none; padding: 20px;">
    <button onclick="tornaAllaHome()" class="btn-back">🏠 Home</button>
    <div id="lista-rapportini"></div>
</div>

<div id="app-interface" style="display:none;">
    <nav class="tabs">
        <button class="tab-btn active" onclick="openTab(event, 'tab1')">📋 DATI</button>
        <button class="tab-btn" onclick="openTab(event, 'tab2')">📦 MAT.</button>
        <button class="tab-btn" onclick="openTab(event, 'tab3')">✍️ FIRMA</button>
    </nav>

    <section id="tab1" class="tab-content">
        <div class="input-group">
            <label>Zona</label><input type="text" id="zona">
            <label>Operatore</label><input type="text" id="operatore">
            <label>Data</label><input type="date" id="dataIntervento">
            <label>Descrizione</label><textarea id="descrizioneIntervento" rows="5"></textarea>
        </div>
    </section>

    <section id="tab2" class="tab-content" style="display:none;">
        <input type="text" id="searchArticolo" onkeyup="searchInDanea()" placeholder="Cerca...">
        <div id="risultatiRicerca"></div>
        <div id="carrelloMateriali"></div>
    </section>

    <section id="tab3" class="tab-content" style="display:none;">
        <div class="canvas-wrapper" style="border:1px solid #000; background:#fff;">
            <canvas id="signature-pad"></canvas>
        </div>
        <button onclick="signaturePad.clear()">Cancella Firma</button>
        <br><br>
        <label>Allega Foto</label>
        <input type="file" id="fotoInput" accept="image/*" multiple>
        <br><br>
        <button class="btn-preview" onclick="generaAnteprimaPDF()">👁️ ANTEPRIMA</button>
        <button class="btn-send" onclick="generaEInviaPDF()">🚀 INVIA RAPPORTO</button>
    </section>
</div>

<script src="script.js"></script>
</body>
</html>
