<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>App Rapportini</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.0.0/dist/signature_pad.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    
    <style>
        textarea { width: 100%; border-radius: 8px; border: 1px solid #ccc; padding: 15px; box-sizing: border-box; font-family: inherit; font-size: 14px; }
        .tabs { display: flex; background: #004a99; margin-bottom: 10px; }
        .tab-btn { flex: 1; padding: 15px; color: white; background: none; border: none; font-weight: bold; cursor: pointer; opacity: 0.7; }
        .tab-btn.active { opacity: 1; border-bottom: 3px solid #fff; background: #003366; }
        .tab-content { display: none; padding: 15px; background: white; border-radius: 8px; }
        .tab-content.active { display: block; }
        #home-screen { text-align: center; padding: 50px 20px; }
        .btn-main { width: 100%; max-width: 300px; padding: 20px; margin: 10px; font-size: 18px; font-weight: bold; cursor: pointer; border-radius: 12px; border: none; color: white; }
        .btn-send { background: #27ae60; color: white; border: none; padding: 15px; border-radius: 8px; cursor: pointer; font-size: 16px; width: 100%; font-weight: bold; margin-top: 20px; }
    </style>
</head>
<body>

<div id="home-screen">
    <img src="logoapp.png" style="width: 150px; margin-bottom: 20px;" onerror="this.style.display='none'">
    <h2 style="color: #004a99;">Gestione Interventi</h2>
    <button onclick="mostraApp()" class="btn-main" style="background: #004a99;">➕ NUOVO RAPPORTO</button>
    <button onclick="caricaStorico()" class="btn-main" style="background: #6c757d;">📂 ARCHIVIO RAPPORTI</button>
</div>

<div id="app-interface" style="display:none;">
    <div class="header-logo" style="background: white; padding: 10px; text-align: center; border-bottom: 1px solid #eee;">
        <img src="logo lungo.png" id="img-logo-pdf" alt="Logo" style="max-height: 50px;">
    </div>

    <nav class="tabs">
        <button class="tab-btn active" id="btn-tab1" onclick="openTab(event, 'tab1')">📋 DATI</button>
        <button class="tab-btn" id="btn-tab2" onclick="openTab(event, 'tab2')">📦 MATERIALI</button>
        <button class="tab-btn" id="btn-tab3" onclick="openTab(event, 'tab3')">✍️ FIRMA</button>
    </nav>

    <div id="tab1" class="tab-content active">
        <label>Zona di Intervento</label>
        <input type="text" id="zona" placeholder="Es: Linea 1200">
        <label>Operatore</label>
        <input type="text" id="operatore" placeholder="Tuo Nome">
        <label>Data</label>
        <input type="date" id="dataIntervento">
        <label style="display:block; margin-top:10px;">Descrizione Intervento</label>
        <textarea id="descrizioneIntervento" rows="5" placeholder="Cosa hai fatto?"></textarea>
    </div>

    <div id="tab2" class="tab-content">
        <input type="text" id="searchArticolo" onkeyup="searchInDanea()" placeholder="Cerca materiali...">
        <div id="risultatiRicerca" style="background:#f9f9f9; border-radius:4px;"></div>
        <h3>Selezionati:</h3>
        <div id="carrelloMateriali"></div>
    </div>

    <div id="tab3" class="tab-content">
        <label>Foto (opzionale)</label>
        <input type="file" id="fotoInput" accept="image/*" multiple>
        <hr>
        <label>Firma Cliente</label>
        <div style="border: 2px dashed #ccc; background: #fff; margin-top:10px;">
            <canvas id="signature-pad" style="width: 100%; height: 200px;"></canvas>
        </div>
        <button onclick="signaturePad.clear()" style="margin-top:5px; background:none; border:1px solid red; color:red; padding:5px 10px; border-radius:4px;">Cancella Firma</button>

        <button class="btn-preview" onclick="generaAnteprimaPDF()" style="background: #34495e; color: white; padding: 15px; width: 100%; border-radius: 8px; font-weight: bold; margin-top: 30px; border: none;">👁️ ANTEPRIMA PDF</button>
        <button class="btn-send" onclick="generaEInviaPDF()" id="btnInvia">🚀 INVIA E SALVA</button>
        <button onclick="tornaAllaHome()" style="width:100%; background:none; border:none; color:#666; margin-top:15px;">❌ Annulla</button>
    </div>
</div>

<div id="tab-storico" style="display:none; padding: 20px;">
    <button onclick="tornaAllaHome()" style="padding: 10px; margin-bottom: 20px; background:#eee; border:1px solid #ccc; border-radius:5px;">🏠 Torna alla Home</button>
    <h3>Archivio Rapportini</h3>
    <div id="lista-rapportini"> Caricamento... </div>
</div>

<script src="script.js"></script>
</body>
</html>
