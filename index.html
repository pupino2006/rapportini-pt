<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>App Rapportini</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.0.0/dist/signature_pad.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <style>
        textarea { width: 100%; border-radius: 8px; border: 1px solid #ccc; padding: 20px; box-sizing: border-box; font-family: inherit; font-size: 14px; }
        .btn-send { background: #27ae60; color: white; border: none; padding: 15px; border-radius: 8px; cursor: pointer; font-size: 16px; width: 100%; font-weight: bold; margin-top: 30px; }
        .tabs { display: flex; background: #004a99; }
        .tab-btn { flex: 1; padding: 15px; color: white; background: none; border: none; font-weight: bold; cursor: pointer; }
        .tab-btn.active { background: #003366; border-bottom: 3px solid #fff; }
        .tab-content { display: none; padding: 15px; }
        .tab-content.active { display: block; }
        #home-screen { text-align: center; padding: 50px 20px; }
        .btn-main { width: 100%; max-width: 300px; padding: 20px; margin: 10px; font-size: 18px; font-weight: bold; cursor: pointer; border-radius: 12px; border: none; color: white; }
    </style>
</head>
<body>

<div id="home-screen">
    <img src="logoapp.png" style="width: 150px; margin-bottom: 20px;" onerror="this.style.display='none'">
    <h2 style="color: #004a99;">Gestione Interventi</h2>
    <button onclick="mostraApp()" class="btn-main" style="background: #004a99;">➕ NUOVO RAPPORTO</button>
    <button onclick="caricaStorico()" class="btn-main" style="background: #6c757d;">📂 ARCHIVIO RAPPORTI</button>
</div>

<div id="app-interface" style="display:none;">
    <div class="header-logo" style="background: white; padding: 20px; text-align: center;">
        <img src="logo lungo.png" id="img-logo-pdf" alt="Logo" style="max-height: 80px;">
    </div>

    <nav class="tabs">
        <button class="tab-btn active" onclick="openTab(event, 'tab1')">📋 DATI</button>
        <button class="tab-btn" onclick="openTab(event, 'tab2')">📦 MATERIALI</button>
        <button class="tab-btn" onclick="openTab(event, 'tab3')">✍️ FIRMA</button>
    </nav>

    <section id="tab1" class="tab-content active">
        <div class="input-group">
            <label>Zona di Intervento</label>
            <input type="text" id="zona" placeholder="Inserisci Zona...">
            <label>Operatore</label>
            <input type="text" id="operatore" placeholder="Nome e Cognome">
            <label>Data di Intervento</label>
            <input type="date" id="dataIntervento">
            <label style="margin-top: 15px;">Descrizione Intervento</label>
            <textarea id="descrizioneIntervento" rows="5" placeholder="Descrivi il lavoro..."></textarea>
        </div>
    </section>

    <section id="tab2" class="tab-content">
        <input type="text" id="searchArticolo" onkeyup="searchInDanea()" placeholder="Cerca articoli...">
        <div id="risultatiRicerca" class="lista-dropdown"></div>
        <h3>Articoli Selezionati</h3>
        <div id="carrelloMateriali"></div>
    </section>

    <section id="tab3" class="tab-content">
        <label>Foto Intervento</label>
        <input type="file" id="fotoInput" accept="image/*" multiple>
        <hr>
        <label>Firma del Cliente</label>
        <div class="canvas-wrapper" style="border: 1px solid #ccc; background: #fff;">
            <canvas id="signature-pad" style="width: 100%; height: 200px; touch-action: none;"></canvas>
        </div>
        <button onclick="signaturePad.clear()" style="margin-top:10px;">Cancella Firma</button>

        <div style="margin-top: 20px;">
            <button class="btn-preview" onclick="generaAnteprimaPDF()" style="background: #34495e; color: white; padding: 15px; width: 100%; border-radius: 8px; font-weight: bold; margin-bottom: 10px; border: none;">👁️ ANTEPRIMA PDF</button>
            <button class="btn-send" onclick="generaEInviaPDF()" id="btnInvia">🚀 INVIA E SALVA RAPPORTO</button>
        </div>
    </section>
</div>

<div id="tab-storico" style="display:none; padding: 20px;">
    <button onclick="tornaAllaHome()" style="padding: 10px; margin-bottom: 20px;">🏠 Torna alla Home</button>
    <h3>Archivio Rapportini</h3>
    <div id="lista-rapportini"></div>
</div>

<script src="script.js"></script>
</body>
</html>
