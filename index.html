<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>App Rapportini</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.0.0/dist/signature_pad.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="home-screen">
    <div style="text-align: center; padding: 40px 20px;">
        <img src="logo lungo.png" style="width: 200px; margin-bottom: 30px;" onerror="this.style.display='none'">
        <h2 style="color: #004a99;">Gestione Interventi</h2>
        <button onclick="mostraApp()" class="btn-main">➕ NUOVO RAPPORTO</button>
        <button onclick="caricaStorico()" class="btn-main" style="background: #6c757d;">📂 ARCHIVIO RAPPORTI</button>
    </div>
</div>

<div id="tab-storico" style="display:none; padding: 20px;">
    <button onclick="tornaAllaHome()" class="btn-back">🏠 Home</button>
    <h3 style="color:#004a99;">Storico Rapportini</h3>
    <div id="lista-rapportini"></div>
</div>

<div id="app-interface" style="display:none;">
    <div class="header-logo" style="text-align:center; padding:10px; background:white;">
        <img src="logo lungo.png" id="logo-pdf" style="max-height:60px;">
    </div>
    
    <nav class="tabs" style="display: grid; grid-template-columns: 1fr 1fr 1fr; background: #eee;">
        <button class="tab-btn active" onclick="openTab(event, 'tab1')">📋 DATI</button>
        <button class="tab-btn" onclick="openTab(event, 'tab2')">📦 MAT.</button>
        <button class="tab-btn" onclick="openTab(event, 'tab3')">✍️ FIRMA</button>
    </nav>

    <div id="tab1" class="tab-content" style="padding:15px;">
        <label>Zona di Intervento</label>
        <input type="text" id="zona" placeholder="Es: Linea 1200">
        <label>Operatore</label>
        <input type="text" id="operatore" placeholder="Nome Cognome">
        <label>Data</label>
        <input type="date" id="dataIntervento">
        <label>Descrizione Intervento</label>
        <textarea id="descrizioneIntervento" rows="5" placeholder="Dettagli lavoro..."></textarea>
    </div>

    <div id="tab2" class="tab-content" style="display:none; padding:15px;">
        <input type="text" id="searchArticolo" onkeyup="searchInDanea()" placeholder="Cerca materiale...">
        <div id="risultatiRicerca"></div>
        <h4>Selezionati:</h4>
        <div id="carrelloMateriali"></div>
    </div>

    <div id="tab3" class="tab-content" style="display:none; padding:15px;">
        <label>Firma Cliente</label>
        <div style="border:1px solid #000; background:white;">
            <canvas id="signature-pad" style="width:100%; height:200px;"></canvas>
        </div>
        <button onclick="signaturePad.clear()" style="margin-top:5px;">Cancella Firma</button>
        
        <div style="margin-top:20px;">
            <label>Allega Foto</label>
            <input type="file" id="fotoInput" accept="image/*" multiple>
        </div>

        <div style="margin-top:30px;">
            <button class="btn-preview" onclick="generaAnteprimaPDF()" style="width:100%; padding:15px; margin-bottom:10px; background:#34495e; color:white;">👁️ ANTEPRIMA PDF</button>
            <button class="btn-send" onclick="generaEInviaPDF()" style="width:100%; padding:15px; background:#27ae60; color:white;">🚀 INVIA RAPPORTO</button>
        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
