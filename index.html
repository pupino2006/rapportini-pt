<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>App Rapportini</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.0.0/dist/signature_pad.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    
    <style>
        /* Stili per la Dashboard e lo Storico */
        textarea { width: 100%; border-radius: 8px; border: 1px solid #ccc; padding: 20px; box-sizing: border-box; font-family: inherit; font-size: 14px; }
        
        .btn-main-menu {
            width: 100%;
            max-width: 300px;
            padding: 20px;
            margin: 10px 0;
            font-size: 18px;
            font-weight: bold;
            color: white;
            background: #004a99;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* Modal per Anteprima Foto */
        .modal {
            display: none; position: fixed; z-index: 2000;
            left: 0; top: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.9);
        }
        .modal-content {
            margin: auto; display: block; width: 80%; max-width: 700px;
            margin-top: 10%;
        }
        .close {
            position: absolute; top: 15px; right: 35px; color: #fff;
            font-size: 40px; font-weight: bold; cursor: pointer;
        }

        /* Forza layout navigation */
        .tabs { grid-template-columns: repeat(3, 1fr) !important; display: none; }
        #app-header { display: none; }
    </style>
</head>
<body>

    <div id="home-screen" class="tab-content active">
        <div style="text-align: center; padding: 40px 20px;">
            <img src="logoapp.png" style="width: 150px; margin-bottom: 30px;">
            <h2 style="color: #004a99;">Gestione Interventi</h2>
            
            <button onclick="mostraApp(); openTab(null, 'tab1')" class="btn-main-menu">
                ➕ NUOVO RAPPORTO
            </button>
            
            <button onclick="caricaStorico(); openTab(null, 'tab-storico')" class="btn-main-menu" style="background: #6c757d;">
                📂 STORICO RAPPORTI
            </button>
        </div>
    </div>

    <div id="tab-storico" class="tab-content">
        <div style="padding: 20px;">
            <button onclick="tornaAllaHome()" style="background:none; border:none; color:#004a99; font-weight:bold; cursor:pointer; margin-bottom:15px;">⬅️ Torna alla Home</button>
            <h3 style="color:#004a99; border-bottom: 2px solid #004a99; padding-bottom:10px;">Storico Rapportini</h3>
            <div id="lista-rapportini">
                </div>
        </div>
    </div>

    <div id="app-interface">
        <div id="app-header" class="header-logo" style="background: white; padding: 20px; text-align: center;">
            <img src="logo lungo.png" alt="Logo" style="max-height: 80px; width: auto; display: block; margin: 0 auto;">
        </div>

        <nav id="app-nav" class="tabs">
            <button class="tab-btn active" onclick="openTab(event, 'tab1')">📋 DATI</button>
            <button class="tab-btn" onclick="openTab(event, 'tab2')">📦 MATERIALI</button>
            <button class="tab-btn" onclick="openTab(event, 'tab3')">✍️ FIRMA</button>
        </nav>

        <section id="tab1" class="tab-content">
            <div class="input-group" style="padding: 20px;">
                <label>Zona di Intervento</label>
                <input type="text" id="zona" placeholder="Inserisci Zona...">
                
                <label>Operatore</label>
                <input type="text" id="operatore" placeholder="Nome e Cognome Operatore">
                
                <label>Data di Intervento</label>
                <input type="date" id="dataIntervento">

                <label style="margin-top: 15px;">Descrizione Intervento Eseguito</label>
                <textarea id="descrizioneIntervento" rows="5" placeholder="Descrivi qui il lavoro svolto..."></textarea>
            </div>
        </section>

        <section id="tab2" class="tab-content">
            <div style="padding: 20px;">
                <div class="search-box">
                    <input type="text" id="searchArticolo" onkeyup="searchInDanea()" placeholder="Cerca nel DB Articoli...">
                </div>
                <div id="risultatiRicerca" class="lista-dropdown"></div>
                
                <h3>Articoli Selezionati</h3>
                <div id="carrelloMateriali"></div>
            </div>
        </section>

        <section id="tab3" class="tab-content">
            <div style="padding: 20px;">
                <div class="foto-container">
                    <label>Foto Intervento</label>
                    <input type="file" id="fotoInput" accept="image/*" multiple>
                </div>
                <hr>
                <div class="firma-container">
                    <label>Firma del Cliente</label>
                    <div class="canvas-wrapper">
                        <canvas id="signature-pad" style="border: 1px solid #ccc; width: 100%; height: 200px;"></canvas>
                    </div>
                    <button class="btn-clear" onclick="signaturePad.clear()" style="margin-top: 10px;">Cancella Firma</button>

                    <div class="azioni-finali" style="margin-top: 20px;">
                        <button class="btn-preview" onclick="generaAnteprimaPDF()" style="background: #34495e; color: white; border: none; padding: 15px; border-radius: 8px; cursor: pointer; font-size: 16px; width: 100%; font-weight: bold; margin-bottom: 10px;">
                            👁️ ANTEPRIMA PDF
                        </button>
                        
                        <button class="btn-send" onclick="generaEInviaPDF()" style="background: #27ae60; color: white; border: none; padding: 15px; border-radius: 8px; cursor: pointer; font-size: 16px; width: 100%; font-weight: bold;">
                            🚀 INVIA E SALVA RAPPORTO
                        </button>
                    </div>
                </div>
            </div>
        </section>
    </div>

    <div id="modal-foto" class="modal" onclick="this.style.display='none'">
        <span class="close">&times;</span>
        <img class="modal-content" id="img-anteprima">
    </div>

    <script src="script.js"></script>

    <script>
        // Piccole funzioni di aiuto per la gestione visiva
        function mostraApp() {
            document.getElementById('app-header').style.display = 'block';
            document.getElementById('app-nav').style.display = 'grid';
        }
        
        function tornaAllaHome() {
            // Nasconde tutto e torna alla home
            const contents = document.querySelectorAll('.tab-content');
            contents.forEach(tab => tab.classList.remove('active'));
            document.getElementById('home-screen').classList.add('active');
            document.getElementById('app-header').style.display = 'none';
            document.getElementById('app-nav').style.display = 'none';
        }
    </script>

</body>
</html>
